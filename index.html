<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ryder even better </title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f6f8;
      text-align: center;
    }

    /* HEADER */
    .header {
      background: url('bg.png') center/cover no-repeat;
      padding: 40px 20px 60px;
      color: #333;
      border-bottom-left-radius: 30px;
      border-bottom-right-radius: 30px;
    }

    .logo-container {
      width: 100%;
      max-width: 300px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo {
      width: 100%;
      max-width: 280px;
      height: auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo img {
      width: 100%;
      height: auto;
      object-fit: contain;
      object-position: center;
    }

    .header h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 600;
    }

    /* ICON BUTTONS */
    .icon-row {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: -25px;
    }

    .icon-btn {
      width: 50px;
      height: 50px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 12px rgba(0,0,0,0.15);
      text-decoration: none;
      font-size: 20px;
      color: #f0d27f;
    }

    /* ADD CONTACT */
    .add-contact {
      margin: 25px auto;
      background: #f0d27f;
      color: #282828;
      width: 85%;
      max-width: 420px;
      padding: 14px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: block;
    }

    /* CARD */
    .card {
      background: white;
      width: 85%;
      max-width: 420px;
      margin: 0 auto 15px;
      border-radius: 12px;
      padding: 15px;
      text-align: left;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    .item {
      display: flex;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    .item:last-child {
      border-bottom: none;
    }

    .icon {
      width: 32px;
      text-align: center;
      font-size: 18px;
      margin-right: 10px;
      color: #f0d27f;
    }

    /* SOCIAL */
    .social {
      width: 85%;
      max-width: 420px;
      margin: 25px auto;
      text-align: left;
    }

    .social a {
      background: white;
      padding: 15px;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      text-decoration: none;
      color: black;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }
  </style>
</head>

<body>

    <!-- HEADER -->
    <div class="header">
      <div class="logo-container">
        <div class="logo">
          <img src="Screenshot 2026-04-25 at 5.33.35 PM.png" alt="SGL">
        </div>
      </div>
      <h1> </h1>
    </div>

  <!-- ICONS -->
  <div class="icon-row">
    <a class="icon-btn" href="tel:+16478290187">📞</a>
    <a class="icon-btn" href="mailto:avineesh_chowdhary@ryder.com">✉️</a>
  </div>

  <!-- ADD CONTACT -->
  <a class="add-contact" href="ryder.vcf" download>
    👤 Add Contact
  </a>

  <!-- DETAILS -->
  <div class="card">
    <div class="item">
      <div class="icon">📞</div>
      <div>Avineesh Choudhary<br><b>+16478290187</b></div>
    </div>
    <div class="item">
      <div class="icon">✉️</div>
      <div>avineesh_chowdhary@ryder.com</div>
    </div>
  </div>

  <!-- MAPS AND WEBSITE -->
  


  <!-- SOCIAL -->
  <div class="social">
    <a href="" target="_blank">
      <span>💬 WhatsApp</span>
      <span>›</span>
    </a>
    <a href="" target="_blank" style="margin-top: 15px;">
      <span>📷 Instagram</span>
      <span>›</span>
    </a>
    <a href="https://www.ryder.com/en-us" target="_blank" style="margin-top: 15px;">
      <span>🌐 Website</span>
      <span>›</span>
    </a>
  </div>

</body>
</html>
